<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow — Redesigned Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0c10;
    --surface: #14161d;
    --surface2: #1f232b;
    --ink: #f4f5f7;
    --ink-muted: #9fa6b5;
    --ink-faint: #4b5363;
    --accent: #ff5a36;
    --accent2: #4ade80;
    --accent3: #3b82f6;
    --done: #6b7280;
    --shadow: rgba(0, 0, 0, 0.4);
    --radius: 16px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(255, 90, 54, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(74, 222, 128, 0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    margin-bottom: 48px;
    animation: slideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.8rem, 8vw, 4.2rem);
    font-weight: 700;
    line-height: 0.95;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  h1 span {
    font-style: italic;
    font-weight: 300;
    color: var(--accent);
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 16px;
  }

  .date-display {
    font-size: 13px;
    color: var(--ink-muted);
    font-weight: 400;
  }

  .stats { display: flex; gap: 16px; }

  .stat {
    font-size: 12px;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .stat-dot.active { background: var(--accent2); }
  .stat-dot.done { background: var(--done); }

  /* Input area */
  .input-area {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 6px 6px 6px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 20px var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.05);
    margin-bottom: 16px;
    animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    transition: all 0.2s;
  }

  .input-area:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(255, 90, 54, 0.2), 0 4px 24px var(--shadow);
  }

  .input-area input[type="text"] {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    padding: 10px 0;
  }

  .input-area input::placeholder { color: var(--ink-faint); }

  .priority-select {
    border: 1px solid var(--ink-faint);
    background: var(--surface2);
    border-radius: 10px;
    padding: 6px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    outline: none;
  }

  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .add-btn:hover {
    background: #e24622;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(255, 90, 54, 0.3);
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--ink-faint);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.18s;
  }

  .filter-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
  }

  .clear-done-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--ink-faint);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.18s;
  }

  .clear-done-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin: 24px 0 10px;
    padding-left: 4px;
  }

  .task-list { display: flex; flex-direction: column; gap: 8px; }

  /* Task item */
  .task-item {
    position: relative;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    border: 1px solid rgba(255,255,255,0.02);
    transition: all 0.2s;
    animation: fadeIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    overflow: hidden;
  }

  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .task-item[data-priority="high"]::before { background: var(--accent); }
  .task-item[data-priority="medium"]::before { background: #e8923a; }
  .task-item[data-priority="low"]::before { background: var(--accent2); }

  .task-item:hover {
    box-shadow: 0 6px 18px var(--shadow);
    transform: translateY(-1px);
    border-color: rgba(255,255,255,0.08);
  }

  .task-item.completed { opacity: 0.45; }
  .task-item.completed::before { background: var(--done); }
  .task-item.removing { animation: slideOut 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

  /* Checkbox */
  .checkbox-wrap { flex-shrink: 0; margin-top: 2px; }

  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--ink-faint);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .checkbox:hover { border-color: var(--accent2); }

  .checkbox.checked {
    background: var(--accent2);
    border-color: var(--accent2);
  }

  .checkbox.checked::after {
    content: '';
    width: 10px;
    height: 6px;
    border-left: 2px solid var(--bg);
    border-bottom: 2px solid var(--bg);
    transform: rotate(-45deg) translateY(-1px);
  }

  .task-content { flex: 1; min-width: 0; }

  .task-text {
    font-size: 14.5px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.45;
    word-break: break-word;
  }

  .completed .task-text {
    color: var(--ink-muted);
    text-decoration: line-through;
  }

  .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }

  .priority-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 100px;
  }
  .priority-badge.high { background: rgba(255,90,54,0.15); color: var(--accent); }
  .priority-badge.medium { background: rgba(232,146,58,0.15); color: #e8923a; }
  .priority-badge.low { background: rgba(74,222,128,0.15); color: var(--accent2); }

  .task-time { font-size: 11px; color: var(--ink-muted); }

  /* Task actions */
  .task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.18s; }
  .task-item:hover .task-actions { opacity: 1; }

  .action-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: none;
    background: var(--surface2);
    color: var(--ink-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
  }
  .action-btn:hover { background: var(--ink); color: var(--bg); }
  .action-btn.delete:hover { background: var(--accent); color: #fff; }

  /* Empty state */
  .empty-state { text-align: center; padding: 64px 24px; animation: fadeIn 0.4s ease both; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-title { font-family: 'Fraunces', serif; font-size: 1.4rem; color: var(--ink-muted); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--ink-faint); }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 32px;
    animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
  }
  .progress-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-label { font-size: 12px; font-weight: 500; color: var(--ink-muted); }
  .progress-pct { font-family: 'Fraunces', serif; font-size: 1.1rem; color: var(--ink); }
  .progress-track { height: 6px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), #22c55e); border-radius: 100px; transition: width 0.4s ease; }

  .task-edit-input {
    width: 100%;
    border: 1px solid var(--ink-faint);
    background: var(--surface2);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    color: var(--ink);
    outline: none;
  }

  /* ── Daily Graph ─────────────────────────────── */
  .graph-section { margin: 40px 0 8px; animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both; }
  .graph-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .graph-title { font-family: 'Fraunces', serif; font-size: 1.15rem; color: var(--ink); }
  .graph-legend { display: flex; gap: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .graph-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px 16px 14px;
    border: 1px solid rgba(255,255,255,0.02);
    box-shadow: 0 4px 20px var(--shadow);
  }
  .graph-svg { width: 100%; overflow: visible; }
  .graph-day-label { font-family: 'DM Sans', sans-serif; font-size: 10px; fill: var(--ink-muted); text-anchor: middle; }
  .graph-y-label { font-family: 'DM Sans', sans-serif; font-size: 9px; fill: var(--ink-faint); text-anchor: end; }
  .graph-grid-line { stroke: rgba(255,255,255,0.04); stroke-width: 1; }
  .graph-bar-added { fill: rgba(59, 130, 246, 0.3); rx: 4; }
  .graph-bar-done { fill: rgba(74, 222, 128, 0.4); rx: 4; }
  .graph-line { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; }
  .graph-area { fill: url(#areaGrad); }
  .graph-dot { fill: var(--accent); stroke: var(--surface); stroke-width: 2; cursor: pointer; }

  .graph-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
  .summary-card { background: var(--surface); border-radius: 12px; padding: 14px 16px; text-align: center; border: 1px solid rgba(255,255,255,0.02); }
  .summary-val { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 700; color: var(--ink); }
  .summary-val.accent { color: var(--accent); }
  .summary-val.green { color: var(--accent2); }
  .summary-val.blue { color: var(--accent3); }
  .summary-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); }

  .graph-tooltip {
    position: absolute; background: #fff; color: #000; border-radius: 8px; padding: 7px 11px;
    font-size: 11px; font-weight: 500; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 10;
  }
  .graph-wrap { position: relative; }

  .confetti-piece { position: fixed; width: 8px; height: 8px; pointer-events: none; z-index: 999; animation: confettiFall 1s ease-in forwards; }

  @keyframes slideDown { from { opacity: 0; transform: translateY(-24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  @keyframes slideOut { to { opacity: 0; transform: translateX(24px) scale(0.96); max-height: 0; margin: 0; padding: 0; } }
  @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(120px) rotate(540deg); opacity: 0; } }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-eyebrow">Your daily planner</div>
    <h1>Task<span>flow</span></h1>
    <div class="header-meta">
      <div class="date-display" id="dateDisplay"></div>
      <div class="stats">
        <div class="stat"><div class="stat-dot active"></div><span id="activeCount">0 active</span></div>
        <div class="stat"><div class="stat-dot done"></div><span id="doneCount">0 done</span></div>
      </div>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-top">
      <div class="progress-label">Today's progress</div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="taskInput" placeholder="Add a new task…" maxlength="200" autocomplete="off">
    <select class="priority-select" id="prioritySelect">
      <option value="medium">🟡 Medium</option>
      <option value="high">🔴 High</option>
      <option value="low">🟢 Low</option>
    </select>
    <button class="add-btn" onclick="addTask()">Add task</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('completed', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('high', this)">🔴 High</button>
    <button class="filter-btn" onclick="setFilter('medium', this)">🟡 Medium</button>
    <button class="filter-btn" onclick="setFilter('low', this)">🟢 Low</button>
    <button class="clear-done-btn" onclick="clearCompleted()">Clear done</button>
  </div>

  <div class="graph-section">
    <div class="graph-header">
      <div class="graph-title">Daily Activity</div>
      <div class="graph-legend">
        <div class="legend-item"><div class="legend-dot" style="background:rgba(59, 130, 246, 0.5)"></div>Added</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(74, 222, 128, 0.6)"></div>Completed</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Rate %</div>
      </div>
    </div>
    <div class="graph-wrap">
      <div class="graph-card">
        <svg class="graph-svg" id="graphSvg" height="160"></svg>
      </div>
      <div class="graph-tooltip" id="graphTooltip"></div>
    </div>
    <div class="graph-summary">
      <div class="summary-card">
        <div class="summary-val accent" id="sumTotal">0</div>
        <div class="summary-lbl">Total Tasks</div>
      </div>
      <div class="summary-card">
        <div class="summary-val green" id="sumDone">0</div>
        <div class="summary-lbl">Completed</div>
      </div>
      <div class="summary-card">
        <div class="summary-val blue" id="sumRate">0%</div>
        <div class="summary-lbl">Success Rate</div>
      </div>
    </div>
  </div>

  <div class="task-list" id="taskList"></div>

</div>

<script>
  const STORAGE_KEY = 'taskflow_tasks';
  let tasks = [];
  let filter = 'all';
  let editingId = null;

  function persist() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    } catch (err) {
      console.error('Error saving tasks: ', err);
    }
  }

  function updateDateDisplay() {
    document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });
  }

  let lastKnownDayKey = getDayKey(Date.now());

  function checkDateRollover() {
    const currentDayKey = getDayKey(Date.now());
    if (currentDayKey !== lastKnownDayKey) {
      lastKnownDayKey = currentDayKey;
      updateDateDisplay();
      render(); // refreshes the 7-day activity graph so "Today" shifts too
    }
  }

  function scheduleDateRollover() {
    const now = new Date();
    const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
    const msUntilMidnight = nextMidnight - now;
    setTimeout(() => {
      checkDateRollover();
      scheduleDateRollover();
    }, msUntilMidnight);
  }

  updateDateDisplay();
  scheduleDateRollover();

  // Background tabs throttle timers, so also catch the rollover the moment
  // the tab becomes visible/focused again, instead of waiting on the timer.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') checkDateRollover();
  });
  window.addEventListener('focus', checkDateRollover);

  function loadTasks() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      tasks = stored ? JSON.parse(stored) : [];
    } catch (err) {
      console.error("Error loading tasks: ", err);
      tasks = [];
    }
    render();
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function timeLabel(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const priority = document.getElementById('prioritySelect').value;
    const text = input.value.trim();
    if (!text) { input.focus(); return; }

    const payload = { id: genId(), text, priority, completed: false, ts: Date.now() };
    tasks.unshift(payload);
    persist();
    input.value = '';
    input.focus();
    render();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.completed = !t.completed;
    persist();
    if (t.completed) celebrate(id);
    render();
  }

  function deleteTask(id) {
    const el = document.getElementById('task-' + id);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        persist();
        render();
      }, 280);
    }
  }

  function startEdit(id) {
    editingId = id;
    render();
    const inp = document.getElementById('edit-' + id);
    if (inp) { inp.focus(); inp.select(); }
  }

  function saveEdit(id) {
    const inp = document.getElementById('edit-' + id);
    if (!inp) return;
    const val = inp.value.trim();
    if (val) {
      const t = tasks.find(t => t.id === id);
      if (t) {
        t.text = val;
        persist();
      }
    }
    editingId = null;
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    persist();
    render();
  }

  function getFiltered() {
    switch (filter) {
      case 'active': return tasks.filter(t => !t.completed);
      case 'completed': return tasks.filter(t => t.completed);
      case 'high': return tasks.filter(t => t.priority === 'high');
      case 'medium': return tasks.filter(t => t.priority === 'medium');
      case 'low': return tasks.filter(t => t.priority === 'low');
      default: return tasks;
    }
  }

  function updateStats() {
    const active = tasks.filter(t => !t.completed).length;
    const done = tasks.filter(t => t.completed).length;
    document.getElementById('activeCount').textContent = active + ' active';
    document.getElementById('doneCount').textContent = done + ' done';

    const total = tasks.length;
    const pw = document.getElementById('progressWrap');
    if (total > 0) {
      pw.style.display = '';
      const pct = Math.round((done / total) * 100);
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';
    } else {
      pw.style.display = 'none';
    }
  }

  function render() {
    const list = document.getElementById('taskList');
    const filtered = getFiltered();
    updateStats();

    if (filtered.length === 0) {
      const msgs = {
        all: ['No tasks yet', 'Add your first task above and get things done!'],
        active: ['All caught up!', 'No active tasks — you\'re on a roll 🎉'],
        completed: ['Nothing done yet', 'Complete some tasks to see them here.'],
        high: ['No high-priority tasks', ''],
        medium: ['No medium-priority tasks', ''],
        low: ['No low-priority tasks', ''],
      };
      const [title, sub] = msgs[filter] || msgs.all;
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">${filter === 'completed' ? '✅' : '📝'}</div>
        <div class="empty-title">${title}</div>
        <div class="empty-sub">${sub}</div>
      </div>`;
      return;
    }

    let html = '';
    if (filter === 'all' && filtered.some(t => t.completed) && filtered.some(t => !t.completed)) {
      const active = filtered.filter(t => !t.completed);
      const done = filtered.filter(t => t.completed);
      if (active.length) html += `<div class="section-label">Active</div>` + active.map(renderTask).join('');
      if (done.length) html += `<div class="section-label">Completed</div>` + done.map(renderTask).join('');
    } else {
      html = filtered.map(renderTask).join('');
    }
    list.innerHTML = html;
  }

  function renderTask(t) {
    const isEditing = editingId === t.id;
    return `
    <div class="task-item ${t.completed ? 'completed' : ''}" id="task-${t.id}" data-priority="${t.priority}">
      <div class="checkbox-wrap">
        <div class="checkbox ${t.completed ? 'checked' : ''}" onclick="toggleTask('${t.id}')"></div>
      </div>
      <div class="task-content">
        ${isEditing
          ? `<input class="task-edit-input" id="edit-${t.id}" value="${escHtml(t.text)}"
               onblur="saveEdit('${t.id}')"
               onkeydown="if(event.key==='Enter')saveEdit('${t.id}');if(event.key==='Escape'){editingId=null;render();}">`
          : `<div class="task-text">${escHtml(t.text)}</div>`
        }
        <div class="task-meta">
          <span class="priority-badge ${t.priority}">${t.priority}</span>
          <span class="task-time">${timeLabel(t.ts)}</span>
        </div>
      </div>
      <div class="task-actions">
        ${!t.completed ? `<button class="action-btn" title="Edit" onclick="startEdit('${t.id}')">✎</button>` : ''}
        <button class="action-btn delete" title="Delete" onclick="deleteTask('${t.id}')">×</button>
      </div>
    </div>`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function celebrate(id) {
    const el = document.getElementById('task-' + id);
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const colors = ['#ff5a36','#4ade80','#3b82f6','#e8923a','#8b5cf6'];
    for (let i = 0; i < 12; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `
        left:${rect.left + rect.width * Math.random()}px;
        top:${rect.top + rect.height * 0.5}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-delay:${Math.random()*0.2}s;
        animation-duration:${0.7 + Math.random()*0.5}s;
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 1200);
    }
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  function getDayKey(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function getLast7Days() {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      days.push({
        key: getDayKey(d.getTime()),
        label: i === 0 ? 'Today' : d.toLocaleDateString('en-US', { weekday: 'short' }),
        added: 0, done: 0
      });
    }
    return days;
  }

  function buildGraphData() {
    const days = getLast7Days();
    const map = {};
    days.forEach(d => map[d.key] = d);
    tasks.forEach(t => {
      const k = getDayKey(t.ts);
      if (map[k]) { map[k].added++; if (t.completed) map[k].done++; }
    });
    return days;
  }

  function renderGraph() {
    const svg = document.getElementById('graphSvg');
    if (!svg) return;
    const tooltip = document.getElementById('graphTooltip');
    const wrap = svg.closest('.graph-wrap');
    const W = Math.max(svg.parentElement.clientWidth - 32, 280);
    const H = 160;
    const PAD = { top: 10, right: 16, bottom: 32, left: 28 };
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

    const days = buildGraphData();
    const maxVal = Math.max(4, ...days.map(d => d.added));
    const gridLines = [0, Math.ceil(maxVal/2), maxVal];
    const chartW = W - PAD.left - PAD.right;
    const chartH = H - PAD.top - PAD.bottom;
    const slotW = chartW / days.length;
    const barW = Math.min(slotW * 0.28, 18);
    const xOf = i => PAD.left + slotW * i + slotW / 2;
    const yOf = v => PAD.top + chartH - (v / maxVal) * chartH;

    let html = `<defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ff5a36" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#ff5a36" stop-opacity="0"/>
      </linearGradient>
    </defs>`;

    gridLines.forEach(v => {
      const y = yOf(v);
      html += `<line class="graph-grid-line" x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}"/>`;
      html += `<text class="graph-y-label" x="${PAD.left-4}" y="${y+3}">${v}</text>`;
    });

    days.forEach((d, i) => {
      const x = xOf(i);
      if (d.added > 0) {
        const bh = (d.added / maxVal) * chartH;
        html += `<rect class="graph-bar-added" x="${x-barW-1}" y="${yOf(d.added)}" width="${barW}" height="${bh}"
          onmouseenter="showTip(event,${i})" onmouseleave="hideTip()"/>`;
      }
      if (d.done > 0) {
        const bh = (d.done / maxVal) * chartH;
        html += `<rect class="graph-bar-done" x="${x+1}" y="${yOf(d.done)}" width="${barW}" height="${bh}"
          onmouseenter="showTip(event,${i})" onmouseleave="hideTip()"/>`;
      }
    });

    const ratePts = days.map((d, i) => ({
      x: xOf(i),
      y: yOf(d.added > 0 ? (d.done / d.added) * maxVal : 0)
    }));
    const linePath = ratePts.map((p, i) => `${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
    const areaPath = linePath + ` L${ratePts[ratePts.length-1].x},${yOf(0)} L${ratePts[0].x},${yOf(0)} Z`;
    html += `<path class="graph-area" d="${areaPath}"/>`;
    html += `<path class="graph-line" d="${linePath}"/>`;
    ratePts.forEach((p, i) => {
      html += `<circle class="graph-dot" cx="${p.x}" cy="${p.y}" r="3.5"
        onmouseenter="showTip(event,${i})" onmouseleave="hideTip()"/>`;
    });

    days.forEach((d, i) => {
      html += `<text class="graph-day-label" x="${xOf(i)}" y="${H-6}">${d.label}</text>`;
    });

    svg.innerHTML = html;
    svg._days = days;

    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    document.getElementById('sumTotal').textContent = total;
    document.getElementById('sumDone').textContent = done;
    document.getElementById('sumRate').textContent = total > 0 ? Math.round(done/total*100)+'%' : '0%';

    window.showTip = function(e, idx) {
      const d = svg._days[idx];
      const rate = d.added > 0 ? Math.round(d.done/d.added*100) : 0;
      tooltip.innerHTML = `<b>${d.label}</b><br>Added: ${d.added} &nbsp; Done: ${d.done}<br>Rate: ${rate}%`;
      const rect = wrap.getBoundingClientRect();
      tooltip.style.left = Math.min(e.clientX - rect.left + 10, wrap.clientWidth - 130) + 'px';
      tooltip.style.top = (e.clientY - rect.top - 60) + 'px';
      tooltip.style.opacity = '1';
    };
    window.hideTip = function() { tooltip.style.opacity = '0'; };
  }

  window.addEventListener('resize', renderGraph);

  const _baseRender = render;
  render = function() { _baseRender(); renderGraph(); };

  window.addEventListener('DOMContentLoaded', () => {
    loadTasks();
  });
</script>
</body>
</html>
